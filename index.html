<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Question</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ffd6e8,#ffecc7);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.box{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,.2);
}

button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
}

#yes{
    background:#4CAF50;
    color:white;
}

#no{
    background:#ff4d4d;
    color:white;
    position:absolute;
}

#celebration{
    display:none;
    font-size:25px;
    animation:pop 1s infinite alternate;
}

@keyframes pop{
from{transform:scale(1);}
to{transform:scale(1.1);}
}
</style>
</head>

<body>

<div class="box">

<div class="header">
    <h1>Hi Sister, Miss You 💖</h1>
    <p> Ps5 vanki thariyaaa ❤️</p>
</div>

<div id="buttons">
<button id="yes" onclick="celebrate()">Yes</button>
<button id="no">No</button>
</div>

<div id="celebration">
<h1>🥰😘🤗</h1>
<div style="font-size:100px;">🐼</div>

<div id="dance" style="font-size:70px;">
💃🐼🕺
</div>

<h2>Thank you for accepting! love you Sister ❤️</h2>
</div>

</div>

<script>
const no = document.getElementById("no");
let count = 0;

function moveButton() {
    count++;

    // After 10 attempts or if No is clicked, show the celebration
    if (count >= 10) {
        document.getElementById("buttons").style.display = "none";

        document.getElementById("celebration").innerHTML = `
            <h1>😘🤗💕</h1>
            <div style="font-size:100px;">🐼</div>
            <h2>Thanks for accepting! 💖</h2>
            <h3>I'm ready for the date! 🌹🥰</h3>
        `;

        document.getElementById("celebration").style.display = "block";
        return;
    }

    // Move the No button far away
    const x = Math.random() * (window.innerWidth - no.offsetWidth);
    const y = Math.random() * (window.innerHeight - no.offsetHeight);

    no.style.position = "fixed";
    no.style.left = x + "px";
    no.style.top = y + "px";
}

no.addEventListener("mouseover", moveButton);
no.addEventListener("touchstart", function(e){
    e.preventDefault();
    moveButton();
});

// If the No button is somehow clicked
no.addEventListener("click", function(e){
    e.preventDefault();

    document.getElementById("buttons").style.display = "none";

    document.getElementById("celebration").innerHTML = `
        <h1>😘🤗💕</h1>
        <div style="font-size:100px;">🐼</div>
        <h2>Thanks for accepting! 💖</h2>
        <h3>I'm ready for the date! 🌹🥰</h3>
    `;

    document.getElementById("celebration").style.display = "block";
});
</script>

</body>
</html>
